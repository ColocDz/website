name: Build and Deploy to cPanel
on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install
      - run: pnpm run build   # output: 'standalone' in next.config

      # Copy assets and standalone dependencies Next doesn't include automatically
      - run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          mkdir -p .next/standalone/node_modules/@swc/helpers
          cp -rL node_modules/@swc/helpers/. .next/standalone/node_modules/@swc/helpers/
          mkdir -p .next/standalone/node_modules/next
          cp -rL node_modules/next/. .next/standalone/node_modules/next/

      - name: Create deployment TAR
        run: |
          cd .next/standalone
          find . -name "*.map" -type f -delete
          tar -czf ../../deploy.tar.gz .
          cd ../..


      - name: Deploy via HTTP (PHP)
        run: |
          curl -k -f -X POST \
            -F "token=${{ secrets.DEPLOY_TOKEN }}" \
            -F "file=@deploy.tar.gz" \
            https://colocdz.com/deploy.php || \
          curl -k -f -X POST \
            -F "token=${{ secrets.DEPLOY_TOKEN }}" \
            -F "file=@deploy.tar.gz" \
            https://deploy.colocdz.com/deploy.php

